<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#2d1b69"/>
    </linearGradient>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 月亮 -->
  <circle cx="240" cy="230" r="120" fill="#FFD93D"/>
  <circle cx="290" cy="190" r="100" fill="url(#bg)"/>
  <!-- 星星们 -->
  <text x="340" y="160" font-size="48" fill="#FFD93D">✦</text>
  <text x="150" y="130" font-size="32" fill="#FFD93D" opacity="0.7">✦</text>
  <text x="380" y="260" font-size="28" fill="#FFD93D" opacity="0.5">✦</text>
  <text x="120" y="280" font-size="24" fill="#FFD93D" opacity="0.4">✦</text>
  <!-- 文字 -->
  <text x="256" y="410" text-anchor="middle" font-family="sans-serif" font-size="64" font-weight="bold" fill="#FFD93D">故事星球</text>
</svg>
